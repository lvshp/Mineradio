name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            build_script: build:win
            artifact_name: mineradio-windows-dist
            checksum_file: SHA256SUMS-windows.txt
          - name: macOS
            os: macos-latest
            build_script: build:mac
            artifact_name: mineradio-macos-dist
            checksum_file: SHA256SUMS-macos.txt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend bundle
        run: npm run build:app

      - name: Build desktop package
        run: npm run ${{ matrix.platform.build_script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > "${{ matrix.platform.checksum_file }}"
          else
            find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 shasum -a 256 > "${{ matrix.platform.checksum_file }}"
          fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Mineradio ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
