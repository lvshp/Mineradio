name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to publish, for example v1.0.0'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    env:
      MACOS_SIGNING_ENABLED: ${{ secrets.CSC_LINK != '' && secrets.CSC_KEY_PASSWORD != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' && 'true' || 'false' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            build_script: build:win
            artifact_name: mineradio-windows-dist
            checksum_file: SHA256SUMS-windows.txt
          - name: macOS
            os: macos-15
            build_script: build:mac
            artifact_name: mineradio-macos-dist
            checksum_file: SHA256SUMS-macos.txt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend bundle
        run: npm run build:app

      - name: Enable macOS signing and notarization
        if: matrix.platform.name == 'macOS' && env.MACOS_SIGNING_ENABLED == 'true'
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.build = pkg.build || {};
          pkg.build.mac = pkg.build.mac || {};
          pkg.build.mac.hardenedRuntime = true;
          pkg.build.mac.gatekeeperAssess = false;
          pkg.build.mac.notarize = { teamId: process.env.APPLE_TEAM_ID };
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          NODE

      - name: Build desktop package
        run: npm run ${{ matrix.platform.build_script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ matrix.platform.name == 'macOS' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform.name == 'macOS' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.platform.name == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.platform.name == 'macOS' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform.name == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.platform.name == 'macOS' && env.MACOS_SIGNING_ENABLED == 'true' && 'true' || 'false' }}

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > "${{ matrix.platform.checksum_file }}"
          else
            find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 shasum -a 256 > "${{ matrix.platform.checksum_file }}"
          fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Mineradio ${{ inputs.tag_name || github.ref_name }}
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
